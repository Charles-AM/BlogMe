<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>Private Admin | Regressed Ranker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body data-page="admin">
    <div class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Private admin</p>
          <h1>Regressed Ranker</h1>
        </div>
        <button class="ghost-button hidden" id="logout-button" type="button">Sign out</button>
      </header>

      <main>
        <section class="admin-card" id="login-panel">
          <h2>Sign in</h2>
          <p class="helper-text">Sign in with the owner account from Firebase Authentication.</p>
          <form id="login-form" class="stacked-form">
            <label>
              Email
              <input id="login-email" type="email" autocomplete="email" required>
            </label>
            <label>
              Password
              <input id="login-password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary-button" id="login-button" type="submit">Sign in</button>
          </form>
          <p class="form-message" id="login-message" role="status"></p>
        </section>

        <section class="admin-dashboard hidden" id="admin-dashboard">
          <div class="admin-grid">
            <section class="admin-card">
              <div class="section-heading tight">
                <div>
                  <p class="eyebrow">Blog</p>
                  <h2>Create or Edit Blog Post</h2>
                </div>
                <button class="ghost-button" id="reset-post-form" type="button">New post</button>
              </div>
              <form id="post-form" class="stacked-form">
                <input id="post-id" type="hidden">
                <label>
                  Title
                  <input id="post-title" required maxlength="140">
                </label>
                <label>
                  Featured image URL
                  <input id="post-image" type="url" required>
                </label>
                <div class="form-row">
                  <label>
                    Date
                    <input id="post-date" type="date" required>
                  </label>
                  <label>
                    Category
                    <input id="post-category" placeholder="Review" required>
                  </label>
                </div>
                <label>
                  Tags
                  <input id="post-tags" placeholder="frieren, fantasy, review">
                </label>
                <label>
                  Content
                  <textarea id="post-content" rows="12" required placeholder="Write the post here"></textarea>
                </label>
                <button class="primary-button" id="save-post-button" type="submit">Publish post</button>
              </form>
              <p class="form-message" id="post-message" role="status"></p>
            </section>

            <section class="admin-card admin-list-card">
              <div class="section-heading tight">
                <div>
                  <p class="eyebrow">Manage</p>
                  <h2>Existing Posts</h2>
                </div>
              </div>
              <div id="admin-posts-list" class="admin-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
