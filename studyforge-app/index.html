<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExamGuide - PDF Question Practice</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>ExamGuide</h1>
        <p class="subhead">Upload a study PDF, generate MCQ or essay questions, answer them, and get instant marks with feedback in your browser.</p>
      </div>
      <div class="header-actions">
        <button class="btn" id="themeBtn" type="button" title="Toggle theme">Theme</button>
        <button class="btn" id="demoBtn" type="button" title="Load demo source text">Demo</button>
        <button class="btn" id="clearBtn" type="button" title="Clear everything">Clear</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel input-panel">
        <h2 class="section-title">Create Exam</h2>

        <div class="field">
          <label for="pdfFile">Study PDF <span class="hint">notes, chapter, past paper</span></label>
          <input id="pdfFile" type="file" accept="application/pdf">
        </div>

        <div class="field">
          <label for="sourceText">Or Paste Text <span class="hint">useful for quick testing</span></label>
          <textarea id="sourceText" placeholder="Paste textbook notes, lecture notes, or exam content here..."></textarea>
        </div>

        <div class="field">
          <label for="questionMode">Question Type</label>
          <select id="questionMode">
            <option value="mcq">Multiple choice questions</option>
            <option value="essay">Essay type questions</option>
          </select>
        </div>

        <div class="controls">
          <div class="field">
            <label for="questionCount">Questions</label>
            <input id="questionCount" type="number" min="1" max="20" value="8">
          </div>

          <div class="field">
            <label for="marksEach">Marks each</label>
            <input id="marksEach" type="number" min="1" max="25" value="5">
          </div>
        </div>

        <button class="btn primary" id="generateBtn" type="button">Generate Exam</button>
        <div class="status" id="status">Ready.</div>
      </aside>

      <section>
        <nav class="tabs" aria-label="Exam views">
          <button class="tab active" data-tab="exam" type="button">Exam</button>
          <button class="tab" data-tab="results" type="button">Results</button>
          <button class="tab" data-tab="source" type="button">Source</button>
        </nav>

        <div class="panel dashboard">
          <div class="empty" id="emptyState">
            <div>
              <strong>No exam generated yet.</strong>
              Upload a PDF or paste text, choose MCQ or essay mode, then generate your practice exam.
            </div>
          </div>

          <div id="results" hidden>
            <div class="view active" id="examView"></div>
            <div class="view" id="resultsView"></div>
            <div class="view" id="sourceView"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
